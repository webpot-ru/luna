name: YouTube Video Publish

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "plan builds/validates only; apply uploads to YouTube."
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
      set_id:
        description: "Set ID of the deck to compile and publish."
        required: true
        default: "home_kitchen_cookware_pilot_01"
      support:
        description: "Support language code(s), comma-separated. ALL is refused for publish safety."
        required: true
        default: "RU"
      youtube_environment:
        description: "GitHub environment with the support route OAuth bundle. Use auto for one support channel."
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - youtube-api-branding
          - youtube-api-youtube-2
          - youtube-api-youtube-3
          - youtube-api-youtube-4
      langs:
        description: "Target language code(s), comma-separated. Leave empty for all targets available for each support language."
        required: false
        default: "ES"
      concurrency:
        description: "Video build concurrency per support language."
        required: true
        default: "2"
      metadata_concurrency:
        description: "VectorEngine/Gemini metadata generation concurrency per support language."
        required: true
        default: "4"
      thumbnail_concurrency:
        description: "VectorEngine thumbnail generation concurrency."
        required: true
        default: "2"
      worker_count:
        description: "Total deterministic workers/runners for this support/lang set. Use 5 for a 5-server test, up to 20."
        required: true
        default: "1"
      worker_index:
        description: "0-based deterministic worker index. For 5 workers, run indices 0,1,2,3,4."
        required: true
        default: "0"
      privacy:
        description: "Initial YouTube privacy status. Ignored for publish_mode=scheduled, where upload privacy is private until publishAt."
        required: true
        default: "public"
        type: choice
        options:
          - private
          - unlisted
          - public
      publish_mode:
        description: "public_now uploads immediately with privacy input; scheduled writes publishAt and uploads private."
        required: true
        default: "public_now"
        type: choice
        options:
          - public_now
          - scheduled
      schedule_start_date:
        description: "For publish_mode=scheduled: first local date per channel, YYYY-MM-DD."
        required: false
        default: ""
      schedule_policy:
        description: "Schedule policy JSON path."
        required: false
        default: "config/youtube-publish-schedule-policy.json"
      schedule_calendar:
        description: "Durable schedule reservation calendar JSON path."
        required: false
        default: "config/youtube-publish-calendar.json"
      create_playlists:
        description: "Allow the uploader to create missing unlisted playlists from config/youtube-playlists.json assignments."
        required: true
        default: true
        type: boolean
      allow_republish:
        description: "Allow uploading a set/support/target that is already present in config/youtube-published-videos.json."
        required: true
        default: false
        type: boolean
      generate_thumbnails:
        description: "Generate custom YouTube thumbnails through VectorEngine GPT Image 2."
        required: true
        default: true
        type: boolean
      confirm_thumbnail_spend:
        description: "For thumbnail generation type GENERATE_THUMBNAILS."
        required: false
        default: ""
      confirm_youtube_write:
        description: "For mode=apply type APPLY_YOUTUBE_UPLOAD."
        required: false
        default: ""
      confirm_public:
        description: "For privacy=public type PUBLISH_PUBLIC."
        required: false
        default: "PUBLISH_PUBLIC"

permissions:
  contents: read

concurrency:
  group: youtube-video-publish-${{ github.event.inputs.set_id }}-${{ github.event.inputs.support }}-${{ github.event.inputs.langs }}-${{ github.event.inputs.worker_count }}-${{ github.event.inputs.worker_index }}-${{ github.event.inputs.publish_mode }}
  cancel-in-progress: true

jobs:
  youtube-video-publish:
    runs-on: ubuntu-latest
    environment:
      name: >-
        ${{
          github.event.inputs.youtube_environment != 'auto' && github.event.inputs.youtube_environment ||
          (contains('|EN|EN-GB|ES|ES-419|PT|PT-BR|RU|HI|ID|FR|DE|JA|KO|TR|ZH|en|en-gb|es|es-419|pt|pt-br|ru|hi|id|fr|de|ja|ko|tr|zh|', format('|{0}|', github.event.inputs.support)) && 'youtube-api-branding') ||
          (contains('|VI|TH|MS|PL|NL|SV|NO|DA|FI|CS|SK|HU|RO|vi|th|ms|pl|nl|sv|no|da|fi|cs|sk|hu|ro|', format('|{0}|', github.event.inputs.support)) && 'youtube-api-youtube-2') ||
          (contains('|BG|HR|SR|SL|LT|LV|ET|IS|BN|TL|MY|KM|LO|bg|hr|sr|sl|lt|lv|et|is|bn|tl|my|km|lo|', format('|{0}|', github.event.inputs.support)) && 'youtube-api-youtube-3') ||
          (contains('|NE|SI|TA|TE|KN|ML|UZ|KK|AZ|KA|HY|SW|IT|ne|si|ta|te|kn|ml|uz|kk|az|ka|hy|sw|it|', format('|{0}|', github.event.inputs.support)) && 'youtube-api-youtube-4') ||
          'youtube-api-branding'
        }}
    timeout-minutes: 360
    env:
      EFFECTIVE_YOUTUBE_ENVIRONMENT: >-
        ${{
          github.event.inputs.youtube_environment != 'auto' && github.event.inputs.youtube_environment ||
          (contains('|EN|EN-GB|ES|ES-419|PT|PT-BR|RU|HI|ID|FR|DE|JA|KO|TR|ZH|en|en-gb|es|es-419|pt|pt-br|ru|hi|id|fr|de|ja|ko|tr|zh|', format('|{0}|', github.event.inputs.support)) && 'youtube-api-branding') ||
          (contains('|VI|TH|MS|PL|NL|SV|NO|DA|FI|CS|SK|HU|RO|vi|th|ms|pl|nl|sv|no|da|fi|cs|sk|hu|ro|', format('|{0}|', github.event.inputs.support)) && 'youtube-api-youtube-2') ||
          (contains('|BG|HR|SR|SL|LT|LV|ET|IS|BN|TL|MY|KM|LO|bg|hr|sr|sl|lt|lv|et|is|bn|tl|my|km|lo|', format('|{0}|', github.event.inputs.support)) && 'youtube-api-youtube-3') ||
          (contains('|NE|SI|TA|TE|KN|ML|UZ|KK|AZ|KA|HY|SW|IT|ne|si|ta|te|kn|ml|uz|kk|az|ka|hy|sw|it|', format('|{0}|', github.event.inputs.support)) && 'youtube-api-youtube-4') ||
          'youtube-api-branding'
        }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Refuse unsafe broad publish inputs
        shell: bash
        env:
          MODE: ${{ github.event.inputs.mode }}
          SUPPORT: ${{ github.event.inputs.support }}
          YOUTUBE_ENVIRONMENT: ${{ github.event.inputs.youtube_environment }}
          PRIVACY: ${{ github.event.inputs.privacy }}
          PUBLISH_MODE: ${{ github.event.inputs.publish_mode }}
          SCHEDULE_START_DATE: ${{ github.event.inputs.schedule_start_date }}
          WORKER_COUNT: ${{ github.event.inputs.worker_count }}
          WORKER_INDEX: ${{ github.event.inputs.worker_index }}
          CONFIRM_YOUTUBE_WRITE: ${{ github.event.inputs.confirm_youtube_write }}
          CONFIRM_PUBLIC: ${{ github.event.inputs.confirm_public }}
        run: |
          set -euo pipefail
          if [ "$(printf '%s' "$SUPPORT" | tr '[:lower:]' '[:upper:]' | xargs)" = "ALL" ]; then
            echo "::error::This workflow refuses support=ALL. Pass an explicit support list like RU,EN,ES."
            exit 1
          fi
          if ! printf '%s' "$WORKER_COUNT" | grep -Eq '^[0-9]+$'; then
            echo "::error::worker_count must be an integer."
            exit 1
          fi
          if ! printf '%s' "$WORKER_INDEX" | grep -Eq '^[0-9]+$'; then
            echo "::error::worker_index must be an integer."
            exit 1
          fi
          if [ "$WORKER_COUNT" -lt 1 ] || [ "$WORKER_COUNT" -gt 20 ]; then
            echo "::error::worker_count must be between 1 and 20."
            exit 1
          fi
          if [ "$WORKER_INDEX" -lt 0 ] || [ "$WORKER_INDEX" -ge "$WORKER_COUNT" ]; then
            echo "::error::worker_index must be 0..worker_count-1."
            exit 1
          fi
          if [ "$MODE" = "apply" ] && [ "$CONFIRM_YOUTUBE_WRITE" != "APPLY_YOUTUBE_UPLOAD" ]; then
            echo "::error::mode=apply requires confirm_youtube_write=APPLY_YOUTUBE_UPLOAD"
            exit 1
          fi
          if [ "$PUBLISH_MODE" = "scheduled" ] && [ -z "$SCHEDULE_START_DATE" ]; then
            echo "::error::publish_mode=scheduled requires schedule_start_date=YYYY-MM-DD"
            exit 1
          fi
          if [ "$PUBLISH_MODE" = "scheduled" ] && ! printf '%s' "$SCHEDULE_START_DATE" | grep -Eq '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'; then
            echo "::error::schedule_start_date must be YYYY-MM-DD"
            exit 1
          fi
          if [ "$PRIVACY" = "public" ] && [ "$CONFIRM_PUBLIC" != "PUBLISH_PUBLIC" ]; then
            echo "::error::privacy=public requires confirm_public=PUBLISH_PUBLIC"
            exit 1
          fi
          if [ "$PUBLISH_MODE" = "scheduled" ] && [ "$CONFIRM_PUBLIC" != "PUBLISH_PUBLIC" ]; then
            echo "::error::scheduled uploads become public at publishAt and require confirm_public=PUBLISH_PUBLIC"
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate YouTube API route environment
        shell: bash
        env:
          SUPPORT_INPUT: ${{ github.event.inputs.support }}
          YOUTUBE_ENVIRONMENT_INPUT: ${{ github.event.inputs.youtube_environment }}
        run: |
          set -euo pipefail
          node scripts/resolve-youtube-api-environment.mjs --support="$SUPPORT_INPUT" --environment="$EFFECTIVE_YOUTUBE_ENVIRONMENT"
          if [ "$YOUTUBE_ENVIRONMENT_INPUT" != "auto" ]; then
            node scripts/resolve-youtube-api-environment.mjs --support="$SUPPORT_INPUT" --environment="$YOUTUBE_ENVIRONMENT_INPUT"
          fi
          echo "Effective YouTube API environment: $EFFECTIVE_YOUTUBE_ENVIRONMENT"

      - name: Install system dependencies and FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python TTS dependency
        run: pip install edge-tts

      - name: Install Node dependencies
        run: npm ci || npm install

      - name: Install Playwright Chromium with dependencies
        run: npx playwright install chromium --with-deps

      - name: Restore YouTube OAuth bundle from environment secret
        if: ${{ github.event.inputs.mode == 'apply' }}
        env:
          YOUTUBE_OAUTH_BUNDLE_TGZ_B64: ${{ secrets.YOUTUBE_OAUTH_BUNDLE_TGZ_B64 }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${YOUTUBE_OAUTH_BUNDLE_TGZ_B64:-}" ]; then
            echo "::error::Missing environment secret YOUTUBE_OAUTH_BUNDLE_TGZ_B64"
            exit 1
          fi
          printf '%s' "$YOUTUBE_OAUTH_BUNDLE_TGZ_B64" | base64 -d | tar -xzf -
          test -f .local/youtube-oauth/google-oauth-client.json
          test -d .local/youtube-oauth/tokens
          echo "YouTube OAuth bundle restored for environment $EFFECTIVE_YOUTUBE_ENVIRONMENT."

      - name: Download offline deck data from Google Drive
        shell: bash
        run: |
          set -euo pipefail
          SET_ID="${{ github.event.inputs.set_id }}"
          FILE_ID=$(node -e "
            const fs = require('fs');
            const path = require('path');
            const mappingPath = path.resolve('data/deck-sources.json');
            if (fs.existsSync(mappingPath)) {
              const mapping = JSON.parse(fs.readFileSync(mappingPath, 'utf8'));
              console.log(mapping['$SET_ID'] || '');
            }
          ")
          if [ -n "$FILE_ID" ] && [ "$FILE_ID" != "YOUR_GOOGLE_DRIVE_FILE_ID_HERE" ]; then
            echo "Found Google Drive File ID for $SET_ID."
            mkdir -p data/decks
            curl -c /tmp/cookies -sL "https://docs.google.com/uc?export=download&id=${FILE_ID}" > /tmp/confirm.html
            CONFIRM=$(grep -o 'confirm=[^&\" ]*' /tmp/confirm.html | head -n1 | cut -d= -f2 || true)
            if [ -n "$CONFIRM" ]; then
              curl -Lb /tmp/cookies "https://docs.google.com/uc?export=download&confirm=${CONFIRM}&id=${FILE_ID}" -o "data/decks/${SET_ID}.json"
            else
              curl -Lb /tmp/cookies "https://docs.google.com/uc?export=download&id=${FILE_ID}" -o "data/decks/${SET_ID}.json"
            fi
            test -s "data/decks/${SET_ID}.json"
            echo "Downloaded offline data to data/decks/${SET_ID}.json"
          else
            echo "No Google Drive File ID found for $SET_ID in data/deck-sources.json. Running with local files if they exist."
          fi

      - name: Plan YouTube generation targets
        id: generation_targets
        shell: bash
        env:
          SET_ID: ${{ github.event.inputs.set_id }}
          SUPPORT_INPUT: ${{ github.event.inputs.support }}
          LANGS_INPUT: ${{ github.event.inputs.langs }}
          WORKER_COUNT: ${{ github.event.inputs.worker_count }}
          WORKER_INDEX: ${{ github.event.inputs.worker_index }}
          ALLOW_REPUBLISH: ${{ github.event.inputs.allow_republish }}
        run: |
          set -euo pipefail
          PRE_ARGS=("--set" "$SET_ID" "--support" "$SUPPORT_INPUT" "--shard-count" "$WORKER_COUNT" "--shard-index" "$WORKER_INDEX" "--output=outputs/video-generator/youtube-generation-targets-github.json")
          if [ -n "$LANGS_INPUT" ]; then
            PRE_ARGS+=("--targets" "$LANGS_INPUT")
          fi
          if [ "$ALLOW_REPUBLISH" = "true" ]; then
            PRE_ARGS+=("--allow-republish")
          fi
          npm run plan:youtube-generation-targets -- "${PRE_ARGS[@]}"
          node -e '
            const fs = require("fs");
            const report = JSON.parse(fs.readFileSync("outputs/video-generator/youtube-generation-targets-github.json", "utf8"));
            const summary = report.summary || {};
            const hasTargets = summary.hasShardTargets ? "true" : "false";
            fs.appendFileSync(process.env.GITHUB_ENV, `YOUTUBE_GENERATION_HAS_TARGETS=${hasTargets}\n`);
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `has_targets=${hasTargets}\n`);
            console.log(JSON.stringify(summary, null, 2));
            if (process.env.GITHUB_STEP_SUMMARY) {
              fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, [
                "### YouTube generation target preflight",
                "",
                `- Eligible targets before sharding: ${summary.eligibleTargetCount || 0}`,
                `- Targets assigned to this worker: ${summary.shardSelectedTargetCount || 0}`,
                `- Skipped active publications: ${summary.skippedExistingPublicationCount || 0}`,
                "",
              ].join("\n"));
            }
          '

      - name: Build videos, metadata, schedule and thumbnails
        if: ${{ steps.generation_targets.outputs.has_targets == 'true' }}
        shell: bash
        env:
          AI33_API_KEY: ${{ secrets.AI33_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          VECTORENGINE_API_KEY: ${{ secrets.VECTORENGINE_API_KEY }}
          VECTOR_ENGINE_API_KEY: ${{ secrets.VECTOR_ENGINE_API_KEY }}
          VECTORENGINE_BASE_URL: ${{ vars.VECTORENGINE_BASE_URL }}
          VECTORENGINE_GEMINI_MODEL: ${{ vars.VECTORENGINE_GEMINI_MODEL }}
          VECTORENGINE_IMAGE_MODEL: ${{ vars.VECTORENGINE_IMAGE_MODEL }}
          GENERATE_THUMBNAILS: ${{ github.event.inputs.generate_thumbnails }}
          CONFIRM_THUMBNAIL_SPEND: ${{ github.event.inputs.confirm_thumbnail_spend }}
          THUMBNAIL_CONCURRENCY: ${{ github.event.inputs.thumbnail_concurrency }}
          SCHEDULE_START_DATE: ${{ github.event.inputs.schedule_start_date }}
          SCHEDULE_POLICY: ${{ github.event.inputs.schedule_policy }}
          SCHEDULE_CALENDAR: ${{ github.event.inputs.schedule_calendar }}
          ALLOW_REPUBLISH: ${{ github.event.inputs.allow_republish }}
        run: |
          set -euo pipefail
          SET_ID="${{ github.event.inputs.set_id }}"
          SUPPORT_INPUT="${{ github.event.inputs.support }}"
          LANGS_INPUT="${{ github.event.inputs.langs }}"
          CONCURRENCY="${{ github.event.inputs.concurrency }}"
          METADATA_CONCURRENCY="${{ github.event.inputs.metadata_concurrency }}"
          WORKER_COUNT="${{ github.event.inputs.worker_count }}"
          WORKER_INDEX="${{ github.event.inputs.worker_index }}"
          PRIVACY="${{ github.event.inputs.privacy }}"
          PUBLISH_MODE="${{ github.event.inputs.publish_mode }}"
          EFFECTIVE_PRIVACY="$PRIVACY"
          if [ "$PUBLISH_MODE" = "scheduled" ]; then
            EFFECTIVE_PRIVACY="private"
          fi

          target_csv_for_support() {
            local requested_support="$1"
            node -e '
              const fs = require("fs");
              const requestedSupport = String(process.argv[1] || "").trim().replace(/_/g, "-").toUpperCase();
              const report = JSON.parse(fs.readFileSync("outputs/video-generator/youtube-generation-targets-github.json", "utf8"));
              const row = (report.supports || []).find((item) => String(item.supportLang || "").toUpperCase() === requestedSupport);
              process.stdout.write((row?.eligibleTargets || []).join(","));
            ' "$requested_support"
          }

          BUILD_PIDS=()
          BUILD_LABELS=()
          METADATA_STATUS=0
          IFS=',' read -ra SUPPORTS <<< "$SUPPORT_INPUT"
          for raw_support in "${SUPPORTS[@]}"; do
            support="$(echo "$raw_support" | xargs | tr '[:lower:]' '[:upper:]')"
            if [ -z "$support" ]; then
              continue
            fi
            ELIGIBLE_TARGETS="$(target_csv_for_support "$support")"
            if [ -z "$ELIGIBLE_TARGETS" ]; then
              echo "No eligible generation targets for support=$support after publication-registry preflight."
              continue
            fi

            BUILD_ARGS=("--set" "$SET_ID" "--support" "$support" "--concurrency" "$CONCURRENCY" "--shard-count" "$WORKER_COUNT" "--shard-index" "$WORKER_INDEX")
            METADATA_ARGS=("--set" "$SET_ID" "--support" "$support" "--privacy" "$EFFECTIVE_PRIVACY" "--concurrency" "$METADATA_CONCURRENCY" "--shard-count" "$WORKER_COUNT" "--shard-index" "$WORKER_INDEX")
            BUILD_ARGS+=("--langs" "$ELIGIBLE_TARGETS")
            METADATA_ARGS+=("--targets" "$ELIGIBLE_TARGETS")

            echo "Starting video build in background for support=$support targets=$ELIGIBLE_TARGETS"
            node scripts/build-all-deck-videos.mjs "${BUILD_ARGS[@]}" &
            BUILD_PIDS+=("$!")
            BUILD_LABELS+=("video:$support")

            GEMINI_ARGS=()
            if [ -n "${VECTORENGINE_API_KEY:-}" ] || [ -n "${VECTOR_ENGINE_API_KEY:-}" ]; then
              GEMINI_ARGS=("--with-gemini" "--gemini-backend" "vectorengine" "--model" "${VECTORENGINE_GEMINI_MODEL:-gemini-3.5-flash}")
            elif [ -n "${GEMINI_API_KEY:-}" ] || [ -n "${GOOGLE_API_KEY:-}" ]; then
              GEMINI_ARGS=("--with-gemini" "--gemini-backend" "api")
            fi

            echo "Generating metadata while video renders for support=$support"
            if ! node scripts/generate-youtube-metadata.mjs "${METADATA_ARGS[@]}" "${GEMINI_ARGS[@]}"; then
              METADATA_STATUS=1
            fi
          done

          if [ "$METADATA_STATUS" -eq 0 ]; then
            npm run check:youtube-run-isolation -- outputs/video-generator --shard-count="$WORKER_COUNT" --shard-index="$WORKER_INDEX" --allow-empty --output=outputs/video-generator/youtube-run-isolation-report-github.json

            if [ "$PUBLISH_MODE" = "scheduled" ]; then
              SCHEDULE_ARGS=("outputs/video-generator" "--start-date=$SCHEDULE_START_DATE" "--policy=$SCHEDULE_POLICY" "--calendar=$SCHEDULE_CALENDAR" "--target-plan=outputs/video-generator/youtube-generation-targets-github.json" "--write-metadata" "--write-calendar" "--output=outputs/youtube-publish-schedule-github.json")
              if [ "$ALLOW_REPUBLISH" = "true" ]; then
                SCHEDULE_ARGS+=("--allow-republish")
              fi
              npm run plan:youtube-publish-schedule -- "${SCHEDULE_ARGS[@]}"
            fi

            if [ "$GENERATE_THUMBNAILS" = "true" ]; then
              if [ "$CONFIRM_THUMBNAIL_SPEND" != "GENERATE_THUMBNAILS" ]; then
                echo "::error::Thumbnail generation spends VectorEngine image credits. Set confirm_thumbnail_spend=GENERATE_THUMBNAILS."
                METADATA_STATUS=1
              elif [ -z "${VECTORENGINE_API_KEY:-}" ] && [ -z "${VECTOR_ENGINE_API_KEY:-}" ]; then
                echo "::error::Missing VECTORENGINE_API_KEY / VECTOR_ENGINE_API_KEY for thumbnail generation."
                METADATA_STATUS=1
              else
                npm run generate:youtube-thumbnails -- outputs/video-generator --confirm-spend --concurrency="$THUMBNAIL_CONCURRENCY" --output=outputs/video-generator/youtube-thumbnail-generation-report-github.json || METADATA_STATUS=1
              fi
            fi

            if [ "$METADATA_STATUS" -eq 0 ]; then
              if [ "$GENERATE_THUMBNAILS" = "true" ]; then
                npm run check:youtube-thumbnails -- outputs/video-generator --allow-auto-first-frame --output=outputs/video-generator/youtube-thumbnail-report-github.json || METADATA_STATUS=1
              fi
            fi

            if [ "$METADATA_STATUS" -eq 0 ]; then
              if [ "$GENERATE_THUMBNAILS" = "true" ]; then
                REVIEW_ARGS=("outputs/video-generator" "--output-prefix=outputs/video-generator/youtube-thumbnail-review-github" "--allow-auto-first-frame")
                if [ "$PUBLISH_MODE" = "scheduled" ]; then
                  REVIEW_ARGS+=("--require-publish-at")
                fi
                npm run build:youtube-thumbnail-review -- "${REVIEW_ARGS[@]}" || METADATA_STATUS=1
              fi
            fi
          fi

          BUILD_STATUS=0
          for index in "${!BUILD_PIDS[@]}"; do
            if ! wait "${BUILD_PIDS[$index]}"; then
              echo "::error::Background ${BUILD_LABELS[$index]} failed."
              BUILD_STATUS=1
            fi
          done
          if [ "$METADATA_STATUS" -ne 0 ] || [ "$BUILD_STATUS" -ne 0 ]; then
            exit 1
          fi

      - name: Validate YouTube metadata
        if: ${{ steps.generation_targets.outputs.has_targets == 'true' }}
        run: npm run check:youtube-metadata -- outputs/video-generator

      - name: Validate YouTube metadata language
        if: ${{ steps.generation_targets.outputs.has_targets == 'true' }}
        run: npm run check:youtube-metadata-language -- outputs/video-generator --output=outputs/video-generator/youtube-metadata-language-report-github.json

      - name: Validate YouTube playlist naming contract
        if: ${{ steps.generation_targets.outputs.has_targets == 'true' }}
        run: npm run check:youtube-playlist-naming

      - name: Validate video TTS variant contract
        if: ${{ steps.generation_targets.outputs.has_targets == 'true' }}
        run: npm run check:video-tts-variant-contract -- --metadata outputs/video-generator --output=outputs/video-generator/video-tts-variant-contract-report-github.json

      - name: Validate YouTube SEO metadata
        if: ${{ steps.generation_targets.outputs.has_targets == 'true' }}
        shell: bash
        env:
          MODE: ${{ github.event.inputs.mode }}
        run: |
          set -euo pipefail
          SEO_ARGS=("outputs/video-generator" "--output=outputs/video-generator/youtube-seo-metadata-report-github.json")
          if [ "$MODE" = "apply" ]; then
            SEO_ARGS+=("--require-ai-metadata")
          fi
          npm run check:youtube-seo-metadata -- "${SEO_ARGS[@]}"

      - name: Plan YouTube publication
        if: ${{ steps.generation_targets.outputs.has_targets == 'true' }}
        shell: bash
        env:
          CREATE_PLAYLISTS: ${{ github.event.inputs.create_playlists }}
          ALLOW_REPUBLISH: ${{ github.event.inputs.allow_republish }}
          GENERATE_THUMBNAILS: ${{ github.event.inputs.generate_thumbnails }}
          MODE: ${{ github.event.inputs.mode }}
        run: |
          set -euo pipefail
          PLAN_ARGS=("outputs/video-generator" "--write-registry" "--output=outputs/youtube-publish-plan-github.json")
          if [ "$CREATE_PLAYLISTS" = "true" ]; then
            PLAN_ARGS+=("--allow-playlist-create")
          fi
          if [ "$ALLOW_REPUBLISH" = "true" ]; then
            PLAN_ARGS+=("--allow-republish")
          fi
          if [ "$GENERATE_THUMBNAILS" != "true" ]; then
            PLAN_ARGS+=("--allow-auto-thumbnail-fallback")
          fi
          if [ "$MODE" = "apply" ]; then
            PLAN_ARGS+=("--require-ai-metadata")
          fi
          npm run plan:youtube-publish -- "${PLAN_ARGS[@]}"

      - name: Gate publish plan
        if: ${{ steps.generation_targets.outputs.has_targets == 'true' }}
        shell: bash
        env:
          MODE: ${{ github.event.inputs.mode }}
        run: |
          set -euo pipefail
          node -e "
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('outputs/youtube-publish-plan-github.json', 'utf8'));
            console.log(JSON.stringify(report.summary, null, 2));
            if (process.env.MODE === 'apply') {
              const s = report.summary || {};
              if (!s.candidateCount) throw new Error('No publish candidates.');
              if (s.blockerCount) throw new Error('Publish plan has blockers.');
              if (s.publishReadyCount !== s.candidateCount) {
                throw new Error('Not all publish candidates are publish_ready.');
              }
              const missingThumbnails = (report.candidates || []).filter((item) => (
                !item.thumbnailUploadPath
                && item.thumbnailUploadMode !== 'first_frame_auto'
              ));
              if (missingThumbnails.length) {
                throw new Error('Apply publish requires custom thumbnails unless the candidate is explicitly marked first_frame_auto.');
              }
            }
          "

      - name: Upload videos to YouTube
        if: ${{ github.event.inputs.mode == 'apply' && steps.generation_targets.outputs.has_targets == 'true' }}
        shell: bash
        env:
          CREATE_PLAYLISTS: ${{ github.event.inputs.create_playlists }}
          ALLOW_REPUBLISH: ${{ github.event.inputs.allow_republish }}
          PRIVACY: ${{ github.event.inputs.privacy }}
          PUBLISH_MODE: ${{ github.event.inputs.publish_mode }}
        run: |
          set -euo pipefail
          EFFECTIVE_PRIVACY="$PRIVACY"
          if [ "$PUBLISH_MODE" = "scheduled" ]; then
            EFFECTIVE_PRIVACY="private"
          fi
          mapfile -d '' METADATA_FILES < <(find outputs/video-generator -name youtube_metadata.json -print0 | sort -z)
          if [ "${#METADATA_FILES[@]}" -eq 0 ]; then
            echo "::error::No youtube_metadata.json files found."
            exit 1
          fi
          for metadata_file in "${METADATA_FILES[@]}"; do
            PUBLISH_ARGS=("--metadata=$metadata_file" "--privacy=$EFFECTIVE_PRIVACY" "--apply" "--confirm-youtube-write")
            if [ "$CREATE_PLAYLISTS" = "true" ]; then
              PUBLISH_ARGS+=("--create-playlist")
            fi
            if [ "$ALLOW_REPUBLISH" = "true" ]; then
              PUBLISH_ARGS+=("--allow-republish")
            fi
            if [ "$EFFECTIVE_PRIVACY" = "public" ]; then
              PUBLISH_ARGS+=("--confirm-public")
            fi
            npm run apply:youtube-publish -- "${PUBLISH_ARGS[@]}"
          done

      - name: Upload non-secret publish artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: youtube-video-publish-${{ github.event.inputs.mode }}-${{ github.event.inputs.set_id }}-${{ github.run_id }}
          retention-days: 14
          if-no-files-found: warn
          path: |
            outputs/video-generator/
            outputs/youtube-publish-schedule-github.json
            outputs/youtube-publish-plan-github.json
            outputs/youtube-publish-ledger.jsonl
            config/youtube-channels.json
            config/youtube-playlists.json
            config/youtube-publish-calendar.json
            config/youtube-published-videos.json

  persist-publish-state:
    needs: youtube-video-publish
    if: ${{ always() && github.event.inputs.mode == 'apply' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Do not share one pending concurrency slot across a bulk publish wave.
    # GitHub keeps only one pending job per concurrency group; a 50-run batch
    # can cancel older partial-success persist jobs before they merge artifacts.
    concurrency:
      group: youtube-publish-state-${{ github.ref_name }}-${{ github.run_id }}
      cancel-in-progress: false
    permissions:
      contents: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Download publish state artifact
        id: download_publish_state
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: youtube-video-publish-${{ github.event.inputs.mode }}-${{ github.event.inputs.set_id }}-${{ github.run_id }}
          path: .state-artifact

      - name: Merge publish state into current branch
        shell: bash
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ ! -d .state-artifact/config ]; then
            echo "No publish state artifact config directory found; nothing to persist."
            exit 0
          fi
          git fetch origin "$BRANCH_NAME"
          git checkout "$BRANCH_NAME"
          git pull --ff-only origin "$BRANCH_NAME"
          npm run merge:youtube-publish-state -- --artifact-dir=.state-artifact --summary=outputs/youtube-publish-state-merge-github.json
          cat outputs/youtube-publish-state-merge-github.json

      - name: Commit and push publish state
        shell: bash
        env:
          BRANCH_NAME: ${{ github.ref_name }}
          SET_ID: ${{ github.event.inputs.set_id }}
          SUPPORT: ${{ github.event.inputs.support }}
          LANGS: ${{ github.event.inputs.langs }}
        run: |
          set -euo pipefail
          if git diff --quiet -- config/youtube-channels.json config/youtube-playlists.json config/youtube-publish-calendar.json config/youtube-published-videos.json; then
            echo "No YouTube publish state changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add config/youtube-channels.json config/youtube-playlists.json config/youtube-publish-calendar.json config/youtube-published-videos.json
          git commit -m "Persist YouTube publish state for ${SET_ID} ${SUPPORT} ${LANGS}" \
            -m "Source workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          git push origin "HEAD:$BRANCH_NAME"

      - name: Upload publish state merge summary
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: youtube-video-publish-state-merge-${{ github.event.inputs.set_id }}-${{ github.run_id }}
          retention-days: 14
          if-no-files-found: ignore
          path: outputs/youtube-publish-state-merge-github.json
