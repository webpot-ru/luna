name: Compile Deck Videos

on:
  workflow_dispatch:
    inputs:
      set_id:
        description: 'Set ID of the deck to compile'
        required: true
        default: 'home_kitchen_cookware_pilot_01'
      support:
        description: 'Support language (e.g., UZ or UZ,AZ,KK,KA,HY or ALL)'
        required: true
        default: 'ALL'
      concurrency:
        description: 'Concurrency limit (number of parallel builds)'
        required: true
        default: '2'
      langs:
        description: 'Target languages comma-separated (optional, e.g. EN,RU)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install system dependencies & FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Install Python & Edge-TTS
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - run: pip install edge-tts

    - name: Install Node dependencies
      run: npm ci || npm install

    - name: Install Playwright Chromium with dependencies
      run: npx playwright install chromium --with-deps

    - name: Download Offline Deck Data from Google Drive
      run: |
        SET_ID="${{ github.event.inputs.set_id }}"
        FILE_ID=$(node -e "
          const fs = require('fs');
          const path = require('path');
          const mappingPath = path.resolve('data/deck-sources.json');
          if (fs.existsSync(mappingPath)) {
            const mapping = JSON.parse(fs.readFileSync(mappingPath, 'utf8'));
            console.log(mapping['$SET_ID'] || '');
          }
        ")
        if [ -n "$FILE_ID" ] && [ "$FILE_ID" != "YOUR_GOOGLE_DRIVE_FILE_ID_HERE" ]; then
          echo "Found Google Drive File ID for $SET_ID: $FILE_ID"
          mkdir -p data/decks
          curl -c /tmp/cookies -sL "https://docs.google.com/uc?export=download&id=${FILE_ID}" > /tmp/confirm.html
          CONFIRM=$(grep -o 'confirm=[^&\" ]*' /tmp/confirm.html | head -n1 | cut -d= -f2)
          curl -Lb /tmp/cookies "https://docs.google.com/uc?export=download&confirm=${CONFIRM}&id=${FILE_ID}" -o "data/decks/${SET_ID}.json"
          echo "Downloaded offline data to data/decks/${SET_ID}.json"
        else
          echo "No Google Drive File ID found for $SET_ID in data/deck-sources.json (or placeholder active). Running with local files if they exist."
        fi

    - name: Run bulk compilation
      env:
        AI33_API_KEY: ${{ secrets.AI33_API_KEY }}
      run: |
        if [ "${{ github.event.inputs.support }}" = "ALL" ]; then
          # Run remaining support languages including all Blue Ocean priority channels
          for sup in ES-419 TR KO JA PT PT-BR HI UZ AZ KK KA HY; do
            EXTRA_ARGS=""
            if [ -n "${{ github.event.inputs.langs }}" ]; then
              EXTRA_ARGS="--langs ${{ github.event.inputs.langs }}"
            fi
            node scripts/build-all-deck-videos.mjs --set ${{ github.event.inputs.set_id }} --support $sup --concurrency ${{ github.event.inputs.concurrency }} $EXTRA_ARGS
          done
        else
          # Split comma-separated support codes
          IFS=',' read -ra ADDR <<< "${{ github.event.inputs.support }}"
          for sup in "${ADDR[@]}"; do
            sup_trimmed=$(echo "$sup" | xargs)
            EXTRA_ARGS=""
            if [ -n "${{ github.event.inputs.langs }}" ]; then
              EXTRA_ARGS="--langs ${{ github.event.inputs.langs }}"
            fi
            node scripts/build-all-deck-videos.mjs --set ${{ github.event.inputs.set_id }} --support "$sup_trimmed" --concurrency ${{ github.event.inputs.concurrency }} $EXTRA_ARGS
          done
        fi

    - name: Generate YouTube metadata
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
        VECTORENGINE_API_KEY: ${{ secrets.VECTORENGINE_API_KEY }}
        VECTOR_ENGINE_API_KEY: ${{ secrets.VECTOR_ENGINE_API_KEY }}
        VECTORENGINE_BASE_URL: ${{ vars.VECTORENGINE_BASE_URL }}
        VECTORENGINE_GEMINI_MODEL: ${{ vars.VECTORENGINE_GEMINI_MODEL }}
      run: |
        GEMINI_ARGS=""
        if [ -n "${VECTORENGINE_API_KEY:-}" ] || [ -n "${VECTOR_ENGINE_API_KEY:-}" ]; then
          GEMINI_ARGS="--with-gemini --gemini-backend vectorengine --model ${VECTORENGINE_GEMINI_MODEL:-gemini-3.5-flash}"
        elif [ -n "${GEMINI_API_KEY:-}" ] || [ -n "${GOOGLE_API_KEY:-}" ]; then
          GEMINI_ARGS="--with-gemini --gemini-backend api"
        fi
        TARGET_ARGS=""
        if [ -n "${{ github.event.inputs.langs }}" ]; then
          TARGET_ARGS="--targets ${{ github.event.inputs.langs }}"
        fi
        if [ "${{ github.event.inputs.support }}" = "ALL" ]; then
          for sup in ES-419 TR KO JA PT PT-BR HI UZ AZ KK KA HY; do
            node scripts/generate-youtube-metadata.mjs --set ${{ github.event.inputs.set_id }} --support "$sup" $TARGET_ARGS --privacy public $GEMINI_ARGS
          done
        else
          IFS=',' read -ra ADDR <<< "${{ github.event.inputs.support }}"
          for sup in "${ADDR[@]}"; do
            sup_trimmed=$(echo "$sup" | xargs)
            node scripts/generate-youtube-metadata.mjs --set ${{ github.event.inputs.set_id }} --support "$sup_trimmed" $TARGET_ARGS --privacy public $GEMINI_ARGS
          done
        fi
        npm run check:youtube-metadata -- outputs/video-generator
        npm run check:youtube-seo-metadata -- outputs/video-generator --output=outputs/video-generator/youtube-seo-metadata-report.json

    - name: Upload Videos as Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: compiled-videos-${{ github.event.inputs.support }}
        path: outputs/video-generator/
        retention-days: 7
