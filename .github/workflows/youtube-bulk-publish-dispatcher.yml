name: YouTube Bulk Publish Dispatcher

on:
  workflow_dispatch:
    inputs:
      set_id:
        description: "Set ID of the deck to compile and publish."
        required: true
        default: "home_kitchen_cookware_pilot_01"
      mode:
        description: "dry_run plans only; dispatch starts youtube-video-publish.yml runs."
        required: true
        default: "dry_run"
        type: choice
        options:
          - dry_run
          - dispatch
      supports:
        description: "Support codes, route:youtube-1, route:youtube-2, or ALL."
        required: true
        default: "ALL"
      support_source:
        description: "Use support variants or physical channel keys from routing config."
        required: true
        default: "variants"
        type: choice
        options:
          - variants
          - channel-keys
      targets_per_support:
        description: "How many next eligible target languages to choose per support."
        required: true
        default: "4"
      max_parallel:
        description: "Maximum simultaneous youtube-video-publish workflow runs."
        required: true
        default: "8"
      max_active_per_route:
        description: "Maximum active youtube-video-publish runs per YouTube API route."
        required: true
        default: "1"
      exclude_supports:
        description: "Comma-separated support codes to skip, or NONE."
        required: false
        default: "NONE"
      exclude_langs:
        description: "Comma-separated target codes to skip, or NONE."
        required: false
        default: "NONE"
      schedule_start_date:
        description: "For scheduled uploads: first local date per channel, YYYY-MM-DD."
        required: false
        default: ""
      schedule_min_future_minutes:
        description: "For scheduled publishing: move/reuse only slots at least this many minutes in the future."
        required: false
        default: "90"
      dispatch_spacing_seconds:
        description: "Delay after each watched dispatch result."
        required: true
        default: "5"
      playlist_retry_delay_seconds:
        description: "Delay before playlist repair dispatch after playlist-classified transient failure."
        required: true
        default: "180"
      confirm_dispatch:
        description: "For mode=dispatch type DISPATCH_YOUTUBE_BULK."
        required: false
        default: ""
      confirm_youtube_write:
        description: "For live upload dispatch type APPLY_YOUTUBE_UPLOAD."
        required: false
        default: ""
      confirm_thumbnail_spend:
        description: "For VectorEngine thumbnail generation type GENERATE_THUMBNAILS."
        required: false
        default: ""
      confirm_playlist_repair:
        description: "Optional playlist repair confirmation: APPLY_YOUTUBE_PLAYLIST_INSERT."
        required: false
        default: ""

permissions:
  contents: read
  actions: write

concurrency:
  group: youtube-bulk-publish-dispatcher-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  bulk-dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 1440
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Plan or dispatch ordinary YouTube publish wave
        shell: bash
        env:
          MODE: ${{ github.event.inputs.mode }}
          SET_ID: ${{ github.event.inputs.set_id }}
          SUPPORTS: ${{ github.event.inputs.supports }}
          SUPPORT_SOURCE: ${{ github.event.inputs.support_source }}
          TARGETS_PER_SUPPORT: ${{ github.event.inputs.targets_per_support }}
          MAX_PARALLEL: ${{ github.event.inputs.max_parallel }}
          MAX_ACTIVE_PER_ROUTE: ${{ github.event.inputs.max_active_per_route }}
          EXCLUDE_SUPPORTS: ${{ github.event.inputs.exclude_supports }}
          EXCLUDE_LANGS: ${{ github.event.inputs.exclude_langs }}
          SCHEDULE_START_DATE: ${{ github.event.inputs.schedule_start_date }}
          SCHEDULE_MIN_FUTURE_MINUTES: ${{ github.event.inputs.schedule_min_future_minutes }}
          DISPATCH_SPACING_SECONDS: ${{ github.event.inputs.dispatch_spacing_seconds }}
          PLAYLIST_RETRY_DELAY_SECONDS: ${{ github.event.inputs.playlist_retry_delay_seconds }}
          CONFIRM_DISPATCH: ${{ github.event.inputs.confirm_dispatch }}
          CONFIRM_YOUTUBE_WRITE: ${{ github.event.inputs.confirm_youtube_write }}
          CONFIRM_THUMBNAIL_SPEND: ${{ github.event.inputs.confirm_thumbnail_spend }}
          CONFIRM_PLAYLIST_REPAIR: ${{ github.event.inputs.confirm_playlist_repair }}
        run: |
          set -euo pipefail
          ARGS=(
            "--set=$SET_ID"
            "--supports=$SUPPORTS"
            "--support-source=$SUPPORT_SOURCE"
            "--targets-per-support=$TARGETS_PER_SUPPORT"
            "--max-parallel=$MAX_PARALLEL"
            "--max-active-per-route=$MAX_ACTIVE_PER_ROUTE"
            "--exclude-supports=$EXCLUDE_SUPPORTS"
            "--exclude-langs=$EXCLUDE_LANGS"
            "--schedule-start-date=$SCHEDULE_START_DATE"
            "--schedule-min-future-minutes=$SCHEDULE_MIN_FUTURE_MINUTES"
            "--dispatch-spacing-seconds=$DISPATCH_SPACING_SECONDS"
            "--playlist-retry-delay-seconds=$PLAYLIST_RETRY_DELAY_SECONDS"
            "--ref=${GITHUB_REF_NAME}"
            "--mode=apply"
            "--publish-mode=scheduled"
            "--privacy=public"
            "--confirm-dispatch=$CONFIRM_DISPATCH"
            "--confirm-youtube-write=$CONFIRM_YOUTUBE_WRITE"
            "--confirm-thumbnail-spend=$CONFIRM_THUMBNAIL_SPEND"
            "--confirm-playlist-repair=$CONFIRM_PLAYLIST_REPAIR"
            "--output=outputs/youtube-bulk-publish-dispatcher-report.json"
          )
          if [ "$MODE" = "dispatch" ]; then
            ARGS+=("--apply")
          else
            ARGS+=("--dry-run")
          fi
          npm run dispatch:youtube-bulk-publish -- "${ARGS[@]}"

      - name: Upload dispatcher report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: youtube-bulk-publish-dispatcher-${{ github.run_id }}
          retention-days: 14
          if-no-files-found: warn
          path: |
            outputs/youtube-bulk-publish-dispatcher-report.json
