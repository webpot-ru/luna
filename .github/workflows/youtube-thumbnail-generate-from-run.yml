name: YouTube Thumbnail Generate From Run Artifact

on:
  workflow_dispatch:
    inputs:
      source_run_id:
        description: "GitHub Actions run id containing outputs/video-generator artifacts."
        required: true
      set_id:
        description: "Set ID used for evidence naming."
        required: true
        default: "home_kitchen_cookware_pilot_01"
      support:
        description: "Support language for environment routing and evidence."
        required: true
      youtube_environment:
        description: "GitHub environment with VectorEngine secrets. Use auto for a support channel."
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - youtube-api-branding
          - youtube-api-youtube-2
          - youtube-api-youtube-3
          - youtube-api-youtube-4
      thumbnail_concurrency:
        description: "VectorEngine thumbnail generation concurrency."
        required: true
        default: "1"
      force:
        description: "Regenerate existing thumbnails too."
        required: true
        default: false
        type: boolean
      confirm_thumbnail_spend:
        description: "For VectorEngine thumbnail generation type GENERATE_THUMBNAILS."
        required: true
        default: ""

permissions:
  contents: read
  actions: read

concurrency:
  group: youtube-thumbnail-generate-from-run-${{ github.event.inputs.source_run_id }}
  cancel-in-progress: false

jobs:
  generate-thumbnails:
    runs-on: ubuntu-latest
    environment:
      name: >-
        ${{
          github.event.inputs.youtube_environment != 'auto' && github.event.inputs.youtube_environment ||
          (contains('|EN|EN-GB|ES|ES-419|PT|PT-BR|RU|HI|ID|FR|DE|JA|KO|TR|ZH|en|en-gb|es|es-419|pt|pt-br|ru|hi|id|fr|de|ja|ko|tr|zh|', format('|{0}|', github.event.inputs.support)) && 'youtube-api-branding') ||
          (contains('|VI|TH|MS|PL|NL|SV|NO|DA|FI|CS|SK|HU|RO|vi|th|ms|pl|nl|sv|no|da|fi|cs|sk|hu|ro|', format('|{0}|', github.event.inputs.support)) && 'youtube-api-youtube-2') ||
          (contains('|BG|HR|SR|SL|LT|LV|ET|IS|BN|TL|MY|KM|LO|bg|hr|sr|sl|lt|lv|et|is|bn|tl|my|km|lo|', format('|{0}|', github.event.inputs.support)) && 'youtube-api-youtube-3') ||
          (contains('|NE|SI|TA|TE|KN|ML|UZ|KK|AZ|KA|HY|SW|IT|ne|si|ta|te|kn|ml|uz|kk|az|ka|hy|sw|it|', format('|{0}|', github.event.inputs.support)) && 'youtube-api-youtube-4') ||
          'youtube-api-branding'
        }}
    timeout-minutes: 45
    env:
      EFFECTIVE_YOUTUBE_ENVIRONMENT: >-
        ${{
          github.event.inputs.youtube_environment != 'auto' && github.event.inputs.youtube_environment ||
          (contains('|EN|EN-GB|ES|ES-419|PT|PT-BR|RU|HI|ID|FR|DE|JA|KO|TR|ZH|en|en-gb|es|es-419|pt|pt-br|ru|hi|id|fr|de|ja|ko|tr|zh|', format('|{0}|', github.event.inputs.support)) && 'youtube-api-branding') ||
          (contains('|VI|TH|MS|PL|NL|SV|NO|DA|FI|CS|SK|HU|RO|vi|th|ms|pl|nl|sv|no|da|fi|cs|sk|hu|ro|', format('|{0}|', github.event.inputs.support)) && 'youtube-api-youtube-2') ||
          (contains('|BG|HR|SR|SL|LT|LV|ET|IS|BN|TL|MY|KM|LO|bg|hr|sr|sl|lt|lv|et|is|bn|tl|my|km|lo|', format('|{0}|', github.event.inputs.support)) && 'youtube-api-youtube-3') ||
          (contains('|NE|SI|TA|TE|KN|ML|UZ|KK|AZ|KA|HY|SW|IT|ne|si|ta|te|kn|ml|uz|kk|az|ka|hy|sw|it|', format('|{0}|', github.event.inputs.support)) && 'youtube-api-youtube-4') ||
          'youtube-api-branding'
        }}

    steps:
      - name: Check confirmation
        shell: bash
        env:
          CONFIRM_THUMBNAIL_SPEND: ${{ github.event.inputs.confirm_thumbnail_spend }}
        run: |
          set -euo pipefail
          if [ "$CONFIRM_THUMBNAIL_SPEND" != "GENERATE_THUMBNAILS" ]; then
            echo "::error::Live thumbnail generation requires confirm_thumbnail_spend=GENERATE_THUMBNAILS"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          npm ci || npm install

      - name: Install ffmpeg
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Validate route environment
        shell: bash
        env:
          SUPPORT_INPUT: ${{ github.event.inputs.support }}
          YOUTUBE_ENVIRONMENT_INPUT: ${{ github.event.inputs.youtube_environment }}
        run: |
          set -euo pipefail
          if [ "$YOUTUBE_ENVIRONMENT_INPUT" = "auto" ]; then
            node scripts/resolve-youtube-api-environment.mjs --support="$SUPPORT_INPUT" --environment="$EFFECTIVE_YOUTUBE_ENVIRONMENT"
          else
            node scripts/resolve-youtube-api-environment.mjs --support="$SUPPORT_INPUT" --environment="$YOUTUBE_ENVIRONMENT_INPUT"
          fi
          echo "Effective environment: $EFFECTIVE_YOUTUBE_ENVIRONMENT"

      - name: Download source run artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_RUN_ID: ${{ github.event.inputs.source_run_id }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/youtube-thumbnail-source
          gh run download "$SOURCE_RUN_ID" --repo "$GITHUB_REPOSITORY" --dir /tmp/youtube-thumbnail-source
          find /tmp/youtube-thumbnail-source -name youtube_metadata.json -o -name youtube_thumbnail.jpg -o -name 'lesson_*.mp4' | sort | head -n 80

      - name: Locate video generator root
        id: locate
        shell: bash
        env:
          SUPPORT: ${{ github.event.inputs.support }}
        run: |
          set -euo pipefail
          node - <<'NODE'
          const fs = require("fs");
          const path = require("path");
          const root = "/tmp/youtube-thumbnail-source";
          const support = String(process.env.SUPPORT || "").replace(/_/g, "-").toUpperCase();
          const metadataFiles = [];
          function walk(dir) {
            for (const ent of fs.readdirSync(dir, { withFileTypes: true })) {
              const p = path.join(dir, ent.name);
              if (ent.isDirectory()) walk(p);
              else if (ent.name === "youtube_metadata.json") metadataFiles.push(p);
            }
          }
          walk(root);
          const matching = metadataFiles.filter((file) => {
            const metadata = JSON.parse(fs.readFileSync(file, "utf8"));
            return String(metadata.supportLang || "").replace(/_/g, "-").toUpperCase() === support;
          });
          if (!matching.length) {
            console.error(`No metadata files found for support=${support}`);
            process.exit(1);
          }
          const generatorRoots = [...new Set(matching.map((file) => {
            const marker = `${path.sep}outputs${path.sep}video-generator${path.sep}`;
            const index = file.indexOf(marker);
            if (index === -1) return path.dirname(file);
            return file.slice(0, index + marker.length - 1);
          }))];
          if (generatorRoots.length !== 1) {
            console.error(`Expected one video-generator root, got ${generatorRoots.length}`);
            console.error(generatorRoots.join("\n"));
            process.exit(1);
          }
          const rows = matching.map((file) => {
            const dir = path.dirname(file);
            return {
              metadata: file,
              mp4: fs.existsSync(path.join(dir, `lesson_${JSON.parse(fs.readFileSync(file, "utf8")).targetLang.toLowerCase()}_${support.toLowerCase()}.mp4`)),
              thumbnail: fs.existsSync(path.join(dir, "youtube_thumbnail.jpg")),
            };
          });
          const before = {
            support,
            metadataCount: rows.length,
            mp4Count: rows.filter((row) => row.mp4).length,
            existingThumbnailCount: rows.filter((row) => row.thumbnail).length,
            missingThumbnailCount: rows.filter((row) => !row.thumbnail).length,
            generatorRoot: generatorRoots[0],
          };
          fs.mkdirSync("outputs", { recursive: true });
          fs.writeFileSync("outputs/youtube-thumbnail-generate-from-run-before.json", `${JSON.stringify(before, null, 2)}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `root=${generatorRoots[0]}\n`);
          console.log(JSON.stringify(before, null, 2));
          NODE

      - name: Generate missing thumbnails
        shell: bash
        env:
          ROOT: ${{ steps.locate.outputs.root }}
          THUMBNAIL_CONCURRENCY: ${{ github.event.inputs.thumbnail_concurrency }}
          FORCE: ${{ github.event.inputs.force }}
          VECTORENGINE_API_KEY: ${{ secrets.VECTORENGINE_API_KEY }}
          VECTOR_ENGINE_API_KEY: ${{ secrets.VECTOR_ENGINE_API_KEY }}
          VECTORENGINE_BASE_URL: ${{ vars.VECTORENGINE_BASE_URL }}
          VECTORENGINE_IMAGE_MODEL: ${{ vars.VECTORENGINE_IMAGE_MODEL }}
          VECTORENGINE_IMAGE_TIMEOUT_MS: ${{ vars.VECTORENGINE_IMAGE_TIMEOUT_MS || '300000' }}
          VECTORENGINE_IMAGE_RETRIES: ${{ vars.VECTORENGINE_IMAGE_RETRIES || '3' }}
        run: |
          set -euo pipefail
          if [ -z "${VECTORENGINE_API_KEY:-}" ] && [ -z "${VECTOR_ENGINE_API_KEY:-}" ]; then
            echo "::error::Missing VECTORENGINE_API_KEY / VECTOR_ENGINE_API_KEY for thumbnail generation."
            exit 1
          fi
          ARGS=("$ROOT" "--confirm-spend" "--concurrency=$THUMBNAIL_CONCURRENCY" "--output=outputs/youtube-thumbnail-generation-from-run.json")
          if [ "$FORCE" = "true" ]; then
            ARGS+=("--force")
          fi
          npm run generate:youtube-thumbnails -- "${ARGS[@]}"

      - name: Check generated thumbnails
        shell: bash
        env:
          ROOT: ${{ steps.locate.outputs.root }}
        run: |
          set -euo pipefail
          npm run check:youtube-thumbnails -- "$ROOT" --allow-auto-first-frame --output=outputs/youtube-thumbnail-check-from-run.json

      - name: Summarize after generation
        shell: bash
        env:
          ROOT: ${{ steps.locate.outputs.root }}
          SUPPORT: ${{ github.event.inputs.support }}
        run: |
          set -euo pipefail
          node - <<'NODE'
          const fs = require("fs");
          const path = require("path");
          const root = process.env.ROOT;
          const support = String(process.env.SUPPORT || "").replace(/_/g, "-").toUpperCase();
          const rows = [];
          function walk(dir) {
            for (const ent of fs.readdirSync(dir, { withFileTypes: true })) {
              const p = path.join(dir, ent.name);
              if (ent.isDirectory()) walk(p);
              else if (ent.name === "youtube_metadata.json") {
                const metadata = JSON.parse(fs.readFileSync(p, "utf8"));
                if (String(metadata.supportLang || "").replace(/_/g, "-").toUpperCase() !== support) return;
                rows.push({
                  setId: metadata.setId,
                  supportLang: metadata.supportLang,
                  targetLang: metadata.targetLang,
                  metadata: p,
                  thumbnail: fs.existsSync(path.join(path.dirname(p), "youtube_thumbnail.jpg")),
                  thumbnailPath: metadata.thumbnailPath || "",
                });
              }
            }
          }
          walk(root);
          const summary = {
            support,
            metadataCount: rows.length,
            thumbnailCount: rows.filter((row) => row.thumbnail).length,
            missingThumbnailCount: rows.filter((row) => !row.thumbnail).length,
            rows,
          };
          fs.writeFileSync("outputs/youtube-thumbnail-generate-from-run-after.json", `${JSON.stringify(summary, null, 2)}\n`);
          console.log(JSON.stringify(summary, null, 2));
          if (summary.missingThumbnailCount) process.exit(1);
          NODE

      - name: Upload generated thumbnail artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: youtube-thumbnail-generated-${{ github.event.inputs.set_id }}-${{ github.event.inputs.source_run_id }}
          retention-days: 14
          if-no-files-found: warn
          path: |
            /tmp/youtube-thumbnail-source/**/youtube_metadata.json
            /tmp/youtube-thumbnail-source/**/youtube_thumbnail.jpg
            /tmp/youtube-thumbnail-source/**/youtube_thumbnail_raw.png
            /tmp/youtube-thumbnail-source/**/youtube_thumbnail_metadata.json
            outputs/youtube-thumbnail-generate-from-run-before.json
            outputs/youtube-thumbnail-generation-from-run.json
            outputs/youtube-thumbnail-check-from-run.json
            outputs/youtube-thumbnail-generate-from-run-after.json
