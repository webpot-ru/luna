services:
  postgres:
    image: postgres:16-alpine
    container_name: lunacards-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lunacards}
      POSTGRES_USER: ${POSTGRES_USER:-lunacards}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lunacards}
    ports:
      - "${POSTGRES_PORT:-55433}:5432"
    volumes:
      - lunacards_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  lunacards_postgres_data:
